# docker/docker-compose.yml — 志鉴精简版（OCR + KG + RAG）
# 主部署走 zhijian_deploy/deploy.sh；本文件供容器化场景参考。
#
# 用法：
#   docker-compose up -d
#   docker-compose exec app curl http://ollama:11434/api/tags

version: '3.8'

services:
  ollama:
    image: ollama/ollama:latest
    container_name: zhijian_ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:11434/api/tags"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: zhijian-app:latest
    container_name: zhijian_app
    ports:
      - "8000:8000"
    volumes:
      - ../chroma_zhijian:/app/chroma_zhijian
      - ../data:/app/data
    environment:
      - OLLAMA_HOST=http://ollama:11434
      - PYTHONUNBUFFERED=1
    depends_on:
      ollama:
        condition: service_healthy
    restart: unless-stopped

  # 一次性拉模型任务（不常驻）
  model-init:
    image: ollama/ollama:latest
    container_name: zhijian_model_init
    depends_on:
      ollama:
        condition: service_healthy
    entrypoint: ["ollama", "pull", "qwen2.5:3b"]
    environment:
      - OLLAMA_HOST=http://ollama:11434
    restart: "no"
    profiles: ["init"]

volumes:
  ollama_data: