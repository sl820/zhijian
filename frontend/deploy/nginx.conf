# nginx.conf — 志鉴 v2 本地 nginx 静态服务配置（参考用，部署目标是 GitHub Pages）
#
# 关键配置：
# 1. gzip_static + brotli_static on  让 nginx 优先返回 .gz / .br 预压缩文件
# 2. try_files ... 404 处理 SPA 路由（v2 是单页 hash 路由，只需 /zhijian/ 静态）
# 3. /zhijian/ 路径（vite base 配置）下服务 dist/
# 4. long cache for assets/*, no-cache for index.html（git hash 化文件名 = 永久 cache）
# 5. Range requests on for /persons/*.json（v2 数据层用 Range 拉分片）
#
# 启动（参考）：
#   docker run --rm -p 8080:8080 \
#     -v $PWD/frontend/dist:/usr/share/nginx/html:ro \
#     -v $PWD/frontend/deploy/nginx.conf:/etc/nginx/conf.d/default.conf:ro \
#     nginx:alpine
# 访问 http://localhost:8080/zhijian/

server {
    listen 8080;
    server_name _;

    # 预压缩：优先 .br > .gz > 原文件
    gzip_static on;
    brotli_static on;
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml application/xml;
    gzip_min_length 1024;
    brotli on;
    brotli_types text/plain text/css application/javascript application/json image/svg+xml application/xml;

    # Range requests for data buckets
    add_header Accept-Ranges bytes;
    # CORS for fonts / data (本地调试)
    add_header Access-Control-Allow-Origin "*";

    # 根路径指 /zhijian/（vite base）
    location / {
        return 301 /zhijian/;
    }

    location /zhijian/ {
        alias /usr/share/nginx/html/;
        index index.html;
        try_files $uri $uri/ /zhijian/index.html;

        # 永久 cache 带 hash 的 assets
        location ~* /zhijian/assets/ {
            alias /usr/share/nginx/html/assets/;
            expires 1y;
            add_header Cache-Control "public, immutable, max-age=31536000";
            access_log off;
        }

        # 数据桶：短 cache + 允许 Range
        location ~* /zhijian/(persons|relations|layouts)/ {
            alias /usr/share/nginx/html/;
            expires 1d;
            add_header Cache-Control "public, max-age=86400";
        }

        # index.html 不 cache（带新 hash 立即生效）
        location = /zhijian/index.html {
            alias /usr/share/nginx/html/index.html;
            expires -1;
            add_header Cache-Control "no-cache, must-revalidate";
        }
    }

    # 安全头
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;
}
