# .github/workflows/deploy.yml — 志鉴 v2 部署到 GitHub Pages
#
# 触发：push 到 zhijian-v2-shiyun-style 分支 或 手动 dispatch
# 流程：checkout → npm ci → tsc + vitest 门禁 → vite build → og-image + precompress + og-inject → 部署到 gh-pages
# 部署目标：https://sl820.github.io/zhijian/（Vite base 配 /zhijian/）
#
# 需要的 repo 设置：
#   Settings → Pages → Source: "GitHub Actions"（不是 "Deploy from a branch"）
#   Settings → Actions → General → Workflow permissions: "Read and write permissions"
#   （让 GITHUB_TOKEN 能 push 到 gh-pages 分支）

name: Deploy to GitHub Pages

on:
  push:
    branches: [zhijian-v2-shiyun-style]
  workflow_dispatch:

# 部署时只跑一个实例，并取消之前在跑的
concurrency:
  group: pages
  cancel-in-progress: true

# GITHUB_TOKEN 默认只读，部署要 write
permissions:
  contents: read
  pages: write
  id-token: write

# 不要在 PR 上跑（PR 触发 fork repo 无 secrets）
if: github.event_name != 'pull_request'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Type check
        working-directory: frontend
        run: npx tsc --noEmit

      - name: Unit tests
        working-directory: frontend
        run: npx vitest run

      - name: Generate og-image.png
        working-directory: frontend
        run: python deploy/build-og-image.py

      - name: Build (vite)
        working-directory: frontend
        run: npm run build

      - name: Pre-compress (gzip + brotli)
        working-directory: frontend
        run: node deploy/precompress.mjs dist

      - name: Inject OG meta
        working-directory: frontend
        run: node deploy/og-inject.mjs dist https://sl820.github.io/zhijian

      - name: Disable Jekyll (.nojekyll)
        working-directory: frontend
        run: touch dist/.nojekyll

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
